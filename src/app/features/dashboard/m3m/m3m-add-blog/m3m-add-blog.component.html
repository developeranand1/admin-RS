<div class="container py-4">
  <div class="card shadow-lg border-0">

    <!-- Header -->
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">
        <i class="bi bi-pencil-square me-2"></i>
        Add Blog
      </h4>
    </div>

    <div class="card-body">

      <div class="row g-3">

        <!-- Title -->
        <div class="col-md-6">
          <label class="form-label">Title</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter blog title"
                 [(ngModel)]="blog.title">
        </div>

        <!-- Category -->
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter category"
                 [(ngModel)]="blog.category">
        </div>

        <!-- Type -->
        <div class="col-md-6">
          <label class="form-label">Type</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter blog type (News / Article)"
                 [(ngModel)]="blog.type">
        </div>

        <!-- Author -->
        <div class="col-md-6">
          <label class="form-label">Author Name</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter author name"
                 [(ngModel)]="blog.authorName">
        </div>

        <!-- Short Description -->
        <div class="col-12">
          <label class="form-label">Short Description</label>
          <textarea class="form-control"
                    rows="3"
                    placeholder="Enter short description"
                    [(ngModel)]="blog.shortDescription"></textarea>
        </div>

        <!-- Description Editor -->
        <div class="col-12">
          <label class="form-label">
            <i class="bi bi-text-paragraph me-1"></i>
            Description
          </label>

          <editor
            [(ngModel)]="blog.description"
            [init]="{
              height: 450,
              menubar: 'file edit view insert format tools table help',
              plugins: 'lists link image table code preview fullscreen',
              toolbar:
                'undo redo | blocks | \
                 bold italic underline strikethrough | \
                 fontsize fontfamily | \
                 alignleft aligncenter alignright alignjustify | \
                 bullist numlist outdent indent | \
                 link image table | preview fullscreen code',

              block_formats:
                'Paragraph=p; Heading 1=h1; Heading 2=h2; Heading 3=h3',

              font_size_formats:
                '12px 14px 16px 18px 20px 24px 28px 32px 36px 48px'
            }">
          </editor>
        </div>

        <!-- Meta Title -->
        <div class="col-md-6">
          <label class="form-label">Meta Title</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter meta title"
                 [(ngModel)]="blog.metaTitle">
        </div>

        <!-- Meta Keywords -->
        <div class="col-md-6">
          <label class="form-label">Meta Keywords</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter keywords (comma separated)"
                 [(ngModel)]="blog.metaKeywords">
        </div>

        <!-- Meta Description -->
        <div class="col-12">
          <label class="form-label">Meta Description</label>
          <textarea class="form-control"
                    rows="2"
                    placeholder="Enter meta description"
                    [(ngModel)]="blog.metaDescription"></textarea>
        </div>

        <!-- Image Upload -->
        <div class="col-12">
          <label class="form-label">
            <i class="bi bi-image me-1"></i>
            Upload Image
          </label>
          <input type="file"
                 class="form-control"
                 (change)="onFileChange($event)">
        </div>

        <!-- Image Preview -->
        <div class="col-12" *ngIf="imagePreview">
          <div class="mt-3">
            <img [src]="imagePreview"
                 class="img-thumbnail shadow-sm"
                 width="220">
          </div>
        </div>

      </div>

      <!-- Progress Bar -->
      <div *ngIf="loading" class="mt-4">
        <div class="progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated"
               role="progressbar"
               [style.width.%]="uploadProgress">
            {{ uploadProgress }}%
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="mt-4 text-end">
        <button class="btn btn-success px-4"
                [disabled]="loading"
                (click)="submitBlog()">

          <span *ngIf="!loading">
            <i class="bi bi-check-circle me-1"></i>
            Submit Blog
          </span>

          <span *ngIf="loading">
            <span class="spinner-border spinner-border-sm me-2"></span>
            Uploading...
          </span>

        </button>
      </div>

    </div>
  </div>
</div>
